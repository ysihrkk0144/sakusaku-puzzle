<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 空グラデ -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="100%" stop-color="#ADE8F4"/>
    </linearGradient>
    <!-- 海グラデ -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0096C7"/>
      <stop offset="60%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#023E8A"/>
    </linearGradient>
    <!-- 砂浜グラデ -->
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE599"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <!-- 海底グラデ -->
    <linearGradient id="seabed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#023E8A"/>
      <stop offset="100%" stop-color="#03045E"/>
    </linearGradient>
    <!-- 太陽グロー -->
    <radialGradient id="sun" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#FFF9C4"/>
      <stop offset="50%"  stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
    <!-- 魚1グラデ(オレンジ) -->
    <radialGradient id="f1" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="100%" stop-color="#F4511E"/>
    </radialGradient>
    <!-- 魚2グラデ(黄) -->
    <radialGradient id="f2" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </radialGradient>
    <!-- 魚3グラデ(ピンク) -->
    <radialGradient id="f3" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#E91E8C"/>
    </radialGradient>
    <!-- 魚4グラデ(水色) -->
    <radialGradient id="f4" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#039BE5"/>
    </radialGradient>
    <!-- タコグラデ -->
    <radialGradient id="tako" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#E1BEE7"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </radialGradient>
    <!-- 泡グラデ -->
    <radialGradient id="bub" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B3E5FC" stop-opacity="0.2"/>
    </radialGradient>
    <!-- 影フィルタ -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- 海中光フィルタ -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== 空 ===== -->
  <rect width="512" height="210" fill="url(#sky)"/>

  <!-- 太陽 -->
  <circle cx="410" cy="72" r="55" fill="url(#sun)"/>
  <circle cx="410" cy="72" r="34" fill="#FFD54F"/>
  <!-- 光線 -->
  <g stroke="#FFE082" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="410" y1="26" x2="410" y2="14"/>
    <line x1="410" y1="118" x2="410" y2="130"/>
    <line x1="364" y1="72" x2="352" y2="72"/>
    <line x1="456" y1="72" x2="468" y2="72"/>
    <line x1="377" y1="39" x2="369" y2="31"/>
    <line x1="443" y1="105" x2="451" y2="113"/>
    <line x1="443" y1="39" x2="451" y2="31"/>
    <line x1="377" y1="105" x2="369" y2="113"/>
  </g>

  <!-- 雲1 -->
  <g filter="url(#shadow)">
    <ellipse cx="85"  cy="68" rx="52" ry="30" fill="white"/>
    <ellipse cx="122" cy="54" rx="38" ry="26" fill="white"/>
    <ellipse cx="52"  cy="76" rx="32" ry="22" fill="white"/>
    <ellipse cx="105" cy="78" rx="28" ry="18" fill="#F0FAFF"/>
  </g>
  <!-- 雲2 -->
  <g filter="url(#shadow)">
    <ellipse cx="270" cy="45" rx="42" ry="24" fill="white"/>
    <ellipse cx="305" cy="34" rx="30" ry="20" fill="white"/>
    <ellipse cx="245" cy="52" rx="26" ry="18" fill="white"/>
  </g>
  <!-- カモメ -->
  <g stroke="#546E7A" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M160,95 Q168,88 176,95"/>
    <path d="M190,80 Q200,72 210,80"/>
    <path d="M320,110 Q326,104 332,110"/>
  </g>

  <!-- ===== 海岸・砂浜 ===== -->
  <!-- 砂浜 -->
  <ellipse cx="200" cy="228" rx="240" ry="32" fill="url(#sand)"/>
  <rect x="0" y="222" width="360" height="28" fill="#FFE082"/>
  <!-- 砂浜のテクスチャ -->
  <g opacity="0.3" stroke="#FFC107" stroke-width="1" fill="none">
    <path d="M20,232 Q60,228 100,232 Q140,236 180,232"/>
    <path d="M40,238 Q80,234 120,238 Q160,242 200,238"/>
  </g>

  <!-- ヤシの木 -->
  <g transform="translate(36,220)">
    <!-- 幹 -->
    <path d="M18,0 Q12,-55 9,-110 Q7,-150 11,-188" stroke="#6D4C41" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M20,0 Q14,-55 11,-110 Q9,-150 13,-188" stroke="#8D6E63" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- 葉 -->
    <path d="M11,-188 Q-35,-210 -58,-192 Q-28,-176 11,-188 Z" fill="#43A047"/>
    <path d="M11,-188 Q-8,-232 12,-255 Q22,-228 11,-188 Z" fill="#388E3C"/>
    <path d="M11,-188 Q38,-224 66,-214 Q44,-192 11,-188 Z" fill="#43A047"/>
    <path d="M11,-188 Q54,-205 72,-186 Q46,-172 11,-188 Z" fill="#2E7D32"/>
    <path d="M11,-188 Q-42,-186 -50,-162 Q-22,-164 11,-188 Z" fill="#66BB6A"/>
    <path d="M11,-188 Q22,-248 44,-252 Q40,-224 11,-188 Z" fill="#388E3C"/>
    <!-- ヤシの実 -->
    <circle cx="8"  cy="-184" r="8" fill="#4E342E"/>
    <circle cx="18" cy="-192" r="7" fill="#5D4037"/>
    <circle cx="2"  cy="-194" r="6" fill="#6D4C41"/>
  </g>

  <!-- ===== 波 ===== -->
  <path d="M0,208 Q64,194 128,208 Q192,222 256,208 Q320,194 384,208 Q448,222 512,208 L512,228 Q448,218 384,226 Q320,234 256,222 Q192,210 128,222 Q64,234 0,224 Z" fill="#90E0EF" opacity="0.8"/>
  <path d="M0,218 Q80,206 160,218 Q240,230 320,214 Q400,198 480,214 L512,216 L512,232 L0,232 Z" fill="#48CAE4" opacity="0.6"/>

  <!-- 岩 -->
  <ellipse cx="305" cy="220" rx="22" ry="11" fill="#78909C"/>
  <ellipse cx="295" cy="216" rx="15" ry="9"  fill="#90A4AE"/>

  <!-- ===== 海 ===== -->
  <rect x="0" y="222" width="512" height="290" fill="url(#sea)"/>

  <!-- 海中の光の筋 -->
  <g opacity="0.08">
    <polygon points="190,222 212,222 285,512 258,512" fill="white"/>
    <polygon points="340,222 358,222 418,512 396,512" fill="white"/>
    <polygon points="75,222  92,222 134,512 112,512" fill="white"/>
    <polygon points="450,222 464,222 512,430 512,512 492,512" fill="white"/>
  </g>

  <!-- ===== 海底 ===== -->
  <ellipse cx="256" cy="514" rx="340" ry="58" fill="#03045E"/>
  <rect x="0" y="482" width="512" height="30" fill="#03045E"/>
  <ellipse cx="256" cy="492" rx="310" ry="24" fill="#023E8A" opacity="0.7"/>

  <!-- 海底の砂 -->
  <ellipse cx="256" cy="500" rx="290" ry="14" fill="#0353A4" opacity="0.5"/>

  <!-- ===== 海藻 ===== -->
  <!-- 左の海藻 -->
  <g stroke-linecap="round" fill="none">
    <path d="M118,484 Q106,462 118,440 Q130,418 118,396 Q106,374 118,352" stroke="#1B5E20" stroke-width="6"/>
    <path d="M128,484 Q140,460 128,436 Q116,412 128,388" stroke="#2E7D32" stroke-width="5"/>
    <path d="M108,484 Q96,465 108,446" stroke="#388E3C" stroke-width="4"/>
    <!-- 海藻の葉 -->
    <path d="M118,440 Q98,430 88,416 Q104,418 118,440 Z" fill="#2E7D32" stroke="none"/>
    <path d="M118,396 Q138,386 148,372 Q132,374 118,396 Z" fill="#388E3C" stroke="none"/>
    <path d="M128,436 Q148,424 158,410 Q142,414 128,436 Z" fill="#1B5E20" stroke="none"/>
  </g>
  <!-- 右の海藻 -->
  <g stroke-linecap="round" fill="none">
    <path d="M376,484 Q364,458 376,432 Q388,406 376,380" stroke="#1B5E20" stroke-width="6"/>
    <path d="M388,484 Q400,460 388,436 Q376,412 388,390" stroke="#2E7D32" stroke-width="5"/>
    <path d="M364,484 Q352,462 364,442" stroke="#388E3C" stroke-width="4"/>
    <path d="M376,432 Q356,420 346,406 Q362,410 376,432 Z" fill="#2E7D32" stroke="none"/>
    <path d="M376,380 Q396,368 406,354 Q390,358 376,380 Z" fill="#388E3C" stroke="none"/>
  </g>

  <!-- ===== サンゴ ===== -->
  <!-- サンゴ1 (赤, 左) -->
  <g transform="translate(58,436)" filter="url(#shadow)">
    <rect x="-5" y="-48" width="10" height="50" rx="5" fill="#EF5350"/>
    <circle cx="-15" cy="-44" r="13" fill="#EF5350"/>
    <circle cx="15"  cy="-38" r="11" fill="#E53935"/>
    <circle cx="0"   cy="-54" r="12" fill="#F44336"/>
    <circle cx="-8"  cy="-26" r="9"  fill="#FFCDD2"/>
    <circle cx="10"  cy="-18" r="7"  fill="#EF9A9A"/>
  </g>
  <!-- サンゴ2 (紫, 右) -->
  <g transform="translate(445,440)" filter="url(#shadow)">
    <rect x="-5" y="-44" width="10" height="46" rx="5" fill="#AB47BC"/>
    <circle cx="-13" cy="-40" r="12" fill="#AB47BC"/>
    <circle cx="13"  cy="-34" r="10" fill="#9C27B0"/>
    <circle cx="0"   cy="-50" r="11" fill="#CE93D8"/>
    <circle cx="-6"  cy="-22" r="8"  fill="#CE93D8"/>
    <circle cx="10"  cy="-14" r="6"  fill="#E1BEE7"/>
  </g>
  <!-- サンゴ3 (オレンジ, 中) -->
  <g transform="translate(210,458)" filter="url(#shadow)">
    <rect x="-4" y="-30" width="8" height="32" rx="4" fill="#FF7043"/>
    <circle cx="-10" cy="-26" r="9"  fill="#FF7043"/>
    <circle cx="10"  cy="-22" r="8"  fill="#E64A19"/>
    <circle cx="0"   cy="-34" r="9"  fill="#FFAB91"/>
  </g>
  <!-- サンゴ4 (水色, 右中) -->
  <g transform="translate(335,454)" filter="url(#shadow)">
    <rect x="-4" y="-32" width="8" height="34" rx="4" fill="#26C6DA"/>
    <circle cx="-10" cy="-28" r="9"  fill="#26C6DA"/>
    <circle cx="10"  cy="-24" r="8"  fill="#00ACC1"/>
    <circle cx="0"   cy="-38" r="9"  fill="#80DEEA"/>
    <circle cx="-5"  cy="-14" r="6"  fill="#B2EBF2"/>
  </g>

  <!-- ===== 石・岩 ===== -->
  <ellipse cx="108" cy="490" rx="30" ry="14" fill="#455A64"/>
  <ellipse cx="95"  cy="486" rx="20" ry="10" fill="#546E7A"/>
  <ellipse cx="395" cy="492" rx="24" ry="12" fill="#37474F"/>
  <ellipse cx="265" cy="496" rx="18" ry="9"  fill="#455A64"/>
  <ellipse cx="170" cy="494" rx="14" ry="7"  fill="#546E7A"/>

  <!-- ヒトデ -->
  <g transform="translate(272,478)" filter="url(#shadow)">
    <path d="M0,-18 L4,-5 L18,-5 L7,4 L11,18 L0,9 L-11,18 L-7,4 L-18,-5 L-4,-5 Z" fill="#FF7043"/>
    <circle cx="0" cy="0" r="5" fill="#FF8A65"/>
  </g>
  <g transform="translate(152,489) scale(0.75)">
    <path d="M0,-18 L4,-5 L18,-5 L7,4 L11,18 L0,9 L-11,18 L-7,4 L-18,-5 L-4,-5 Z" fill="#FFA726"/>
    <circle cx="0" cy="0" r="5" fill="#FFCC02"/>
  </g>

  <!-- ===== お魚1: オレンジ・右向き ===== -->
  <g transform="translate(175,308)" filter="url(#shadow)">
    <!-- 体 -->
    <ellipse cx="0" cy="0" rx="42" ry="24" fill="url(#f1)"/>
    <!-- ハイライト -->
    <ellipse cx="-6" cy="-8" rx="18" ry="9" fill="white" opacity="0.25"/>
    <!-- 縞 -->
    <ellipse cx="6"  cy="0" rx="7" ry="22" fill="white" opacity="0.18"/>
    <ellipse cx="20" cy="0" rx="5" ry="20" fill="white" opacity="0.13"/>
    <!-- 尾ひれ -->
    <path d="M42,0 L64,-20 L68,0 L64,20 Z" fill="#E64A19"/>
    <!-- 上ひれ -->
    <path d="M-8,-24 Q4,-40 18,-26" stroke="#E64A19" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- 胸ひれ -->
    <path d="M-4,-5 Q-22,-26 -12,-30 Q0,-18 -4,-5 Z" fill="#FFAB40" opacity="0.85"/>
    <!-- 目 -->
    <circle cx="-26" cy="-7" r="9" fill="white"/>
    <circle cx="-28" cy="-8" r="5" fill="#1A237E"/>
    <circle cx="-30" cy="-10" r="2" fill="white"/>
    <!-- 口 -->
    <path d="M-40,2 Q-36,7 -30,3" stroke="#BF360C" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- ほっぺ -->
    <ellipse cx="-32" cy="-2" rx="5" ry="3" fill="#FF8A65" opacity="0.6"/>
  </g>

  <!-- ===== お魚2: 黄色・左向き ===== -->
  <g transform="translate(368,382) scale(-1,1)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="34" ry="20" fill="url(#f2)"/>
    <ellipse cx="-5" cy="-7" rx="14" ry="7" fill="white" opacity="0.25"/>
    <ellipse cx="5"  cy="0" rx="6" ry="18" fill="white" opacity="0.15"/>
    <path d="M34,0 L52,-16 L55,0 L52,16 Z" fill="#F9A825"/>
    <path d="M-6,-20 Q4,-34 16,-22" stroke="#F9A825" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-3,-4 Q-17,-22 -9,-25 Q1,-14 -3,-4 Z" fill="#FFF176" opacity="0.8"/>
    <circle cx="-21" cy="-5" r="7" fill="white"/>
    <circle cx="-23" cy="-6" r="4" fill="#1A237E"/>
    <circle cx="-24" cy="-8" r="1.5" fill="white"/>
    <path d="M-32,2 Q-28,6 -24,2" stroke="#E65100" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="-26" cy="-1" rx="4" ry="2.5" fill="#FFE082" opacity="0.6"/>
  </g>

  <!-- ===== お魚3: ピンク・右向き ===== -->
  <g transform="translate(285,428)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="27" ry="16" fill="url(#f3)"/>
    <ellipse cx="-4" cy="-5" rx="11" ry="6" fill="white" opacity="0.25"/>
    <ellipse cx="4"  cy="0" rx="5" ry="14" fill="white" opacity="0.15"/>
    <path d="M27,0 L42,-13 L45,0 L42,13 Z" fill="#C2185B"/>
    <path d="M-4,-16 Q4,-28 13,-17" stroke="#C2185B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-2,-3 Q-14,-18 -7,-21 Q2,-10 -2,-3 Z" fill="#F8BBD0" opacity="0.8"/>
    <circle cx="-16" cy="-4" r="6" fill="white"/>
    <circle cx="-18" cy="-5" r="3.5" fill="#1A237E"/>
    <circle cx="-19" cy="-7" r="1.5" fill="white"/>
    <path d="M-25,2 Q-22,5 -19,2" stroke="#880E4F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="-20" cy="-1" rx="3.5" ry="2" fill="#FCE4EC" opacity="0.7"/>
  </g>

  <!-- ===== お魚4: 水色・左向き (小) ===== -->
  <g transform="translate(115,398) scale(-1,1)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="22" ry="13" fill="url(#f4)"/>
    <ellipse cx="-3" cy="-4" rx="9" ry="5" fill="white" opacity="0.25"/>
    <path d="M22,0 L34,-10 L37,0 L34,10 Z" fill="#0288D1"/>
    <path d="M-2,-13 Q4,-23 12,-14" stroke="#0288D1" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-2,-3 Q-11,-14 -5,-17 Q2,-8 -2,-3 Z" fill="#B3E5FC" opacity="0.8"/>
    <circle cx="-13" cy="-3" r="5.5" fill="white"/>
    <circle cx="-15" cy="-4" r="3" fill="#1A237E"/>
    <circle cx="-16" cy="-6" r="1.2" fill="white"/>
    <path d="M-20,1 Q-17,4 -14,1" stroke="#01579B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="-15" cy="-1" rx="3" ry="1.8" fill="#E1F5FE" opacity="0.7"/>
  </g>

  <!-- ===== タコ ===== -->
  <g transform="translate(448,392)" filter="url(#shadow)">
    <!-- 頭・マント -->
    <ellipse cx="0" cy="-8" rx="30" ry="28" fill="url(#tako)"/>
    <!-- ハイライト -->
    <ellipse cx="-8" cy="-18" rx="12" ry="8" fill="white" opacity="0.2"/>
    <!-- 目 -->
    <circle cx="-11" cy="-14" r="8" fill="white"/>
    <circle cx="-12" cy="-15" r="4.5" fill="#4A148C"/>
    <circle cx="-14" cy="-17" r="1.8" fill="white"/>
    <circle cx="11"  cy="-14" r="8" fill="white"/>
    <circle cx="10"  cy="-15" r="4.5" fill="#4A148C"/>
    <circle cx="8"   cy="-17" r="1.8" fill="white"/>
    <!-- 口 -->
    <path d="M-5,0 Q0,6 5,0" stroke="#6A1B9A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- ほっぺ -->
    <ellipse cx="-14" cy="-8" rx="5.5" ry="3.5" fill="#F8BBD0" opacity="0.7"/>
    <ellipse cx="14"  cy="-8" rx="5.5" ry="3.5" fill="#F8BBD0" opacity="0.7"/>
    <!-- 触手 -->
    <path d="M-26,14 Q-34,30 -26,42 Q-18,54 -22,66" stroke="#AB47BC" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M-16,17 Q-20,34 -12,44 Q-4,54 -8,66"  stroke="#CE93D8" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M-4,19  Q-4,36 4,46  Q12,56 8,68"     stroke="#AB47BC" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M8,18   Q14,34 22,40 Q30,46 26,58"    stroke="#CE93D8" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M20,14  Q30,28 38,32 Q46,36 42,50"    stroke="#AB47BC" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- 触手の吸盤 -->
    <circle cx="-26" cy="40" r="3" fill="#E1BEE7" opacity="0.7"/>
    <circle cx="-10" cy="46" r="3" fill="#E1BEE7" opacity="0.7"/>
    <circle cx="6"   cy="48" r="3" fill="#E1BEE7" opacity="0.7"/>
    <circle cx="22"  cy="42" r="2.5" fill="#E1BEE7" opacity="0.7"/>
  </g>

  <!-- ===== 気泡 ===== -->
  <g opacity="0.75">
    <!-- 魚1周辺 -->
    <circle cx="148" cy="350" r="8"  fill="url(#bub)" stroke="#B3E5FC" stroke-width="1"/>
    <circle cx="160" cy="328" r="5.5" fill="url(#bub)" stroke="#B3E5FC" stroke-width="1"/>
    <circle cx="143" cy="308" r="4"  fill="url(#bub)" stroke="#B3E5FC" stroke-width="0.8"/>
    <circle cx="155" cy="292" r="3"  fill="url(#bub)" stroke="#B3E5FC" stroke-width="0.8"/>
    <!-- タコ周辺 -->
    <circle cx="420" cy="362" r="7"  fill="url(#bub)" stroke="#B3E5FC" stroke-width="1"/>
    <circle cx="412" cy="340" r="5"  fill="url(#bub)" stroke="#B3E5FC" stroke-width="1"/>
    <circle cx="424" cy="318" r="3.5" fill="url(#bub)" stroke="#B3E5FC" stroke-width="0.8"/>
    <!-- 魚4周辺 -->
    <circle cx="85"  cy="418" r="6"  fill="url(#bub)" stroke="#B3E5FC" stroke-width="1"/>
    <circle cx="78"  cy="398" r="4"  fill="url(#bub)" stroke="#B3E5FC" stroke-width="0.8"/>
  </g>

  <!-- ===== 波のきらめき ===== -->
  <g opacity="0.4" fill="white">
    <ellipse cx="60"  cy="234" rx="8" ry="2" transform="rotate(-15,60,234)"/>
    <ellipse cx="200" cy="228" rx="6" ry="1.5" transform="rotate(10,200,228)"/>
    <ellipse cx="350" cy="232" rx="7" ry="2" transform="rotate(-8,350,232)"/>
    <ellipse cx="480" cy="226" rx="5" ry="1.5" transform="rotate(12,480,226)"/>
  </g>
</svg>
